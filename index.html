<!DOCTYPE html>
<html>
<head>
<title>The Arrow Unlocked</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<style>
body {
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:40px;
}

button {
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
}

#access {
    display:none;
    margin-top:30px;
}
</style>
</head>

<body>

<h1>🔐 The Arrow Unlocked</h1>

<p>
Connect the wallet holding <strong>The God Spell #7</strong>
to unlock the manuscript.
</p>

<button onclick="checkAccess()">
Connect Wallet
</button>

<p id="status"></p>

<div id="access">

<h2>Access Granted</h2>

<p>
You own The God Spell #7.
</p>

<p>
<a
href="https://drive.google.com/file/d/1kBcPJBmMOhoUh4lcnsXDKMJiRjIPma4j/view?usp=drive_link"
target="_blank"
style="color:#9b7cff;font-size:20px;"
>
Read The Full Manuscript
</a>
</p>

</div>

<script>

const contractAddress = "0xd0cb48bab6095377bf4c2022fbb1ef8a553eda75";

const tokenId = 7;

const abi = [
"function balanceOf(address account, uint256 id) view returns (uint256)"
];

async function checkAccess() {

const status = document.getElementById("status");
const access = document.getElementById("access");

try {

if (!window.ethereum) {
status.innerText = "MetaMask not detected.";
return;
}

const provider = new ethers.BrowserProvider(window.ethereum);

await provider.send("eth_requestAccounts", []);

const signer = await provider.getSigner();

const walletAddress = await signer.getAddress();

const network = await provider.getNetwork();

if (Number(network.chainId) !== 1) {
status.innerText = "Please switch MetaMask to Ethereum Mainnet.";
return;
}

const contract = new ethers.Contract(
contractAddress,
abi,
provider
);

const balance = await contract.balanceOf(
walletAddress,
tokenId
);

status.innerText =
"Wallet: " + walletAddress +
" | Token Balance: " + balance;

if (Number(balance) > 0) {

status.innerText = "Verified.";
access.style.display = "block";

} else {

status.innerText =
"Access denied. This wallet does not own The God Spell #7.";

access.style.display = "none";
}

} catch (error) {

console.error(error);

status.innerText =
"Verification failed: " +
(error.shortMessage || error.message || "Unknown error");
}
}
</script>

</body>
</html>
